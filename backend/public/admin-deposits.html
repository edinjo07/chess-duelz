<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit Management - Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 32px;
      color: #4ECDC4;
    }

    .header-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .admin-name {
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #4ECDC4;
      color: #1a1a2e;
    }

    .btn-primary:hover {
      background: #45b8b0;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #FF6B6B;
      color: white;
    }

    .btn-danger:hover {
      background: #ff5252;
    }

    .btn-success {
      background: #51CF66;
      color: white;
    }

    .btn-secondary {
      background: #6C757D;
      color: white;
    }

    .filters {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
    }

    .filter-group label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .filter-group input,
    .filter-group select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 14px;
    }

    .stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-card h3 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #4ECDC4;
    }

    .deposits-table {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(255, 255, 255, 0.1);
    }

    th {
      padding: 15px;
      text-align: left;
      font-size: 13px;
      color: #4ECDC4;
      font-weight: 600;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .status-finished { background: #51CF66; color: white; }
    .status-confirming { background: #FFD43B; color: #1a1a2e; }
    .status-waiting { background: #74C0FC; color: #1a1a2e; }
    .status-created { background: #6C757D; color: white; }
    .status-failed { background: #FF6B6B; color: white; }
    .status-expired { background: #ADB5BD; color: white; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 30px;
      max-width: 700px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      border: 2px solid rgba(78, 205, 196, 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-header h2 {
      color: #4ECDC4;
      font-size: 24px;
    }

    .close-modal {
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
    }

    .close-modal:hover {
      color: white;
    }

    .detail-group {
      margin-bottom: 15px;
    }

    .detail-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .detail-group .value {
      font-size: 15px;
      color: white;
      font-weight: 500;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #4ECDC4;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      padding: 20px;
    }

    .pagination button {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .pagination button:not(:disabled):hover {
      background: rgba(78, 205, 196, 0.2);
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }

    .warning-box {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #FF6B6B;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
      font-size: 14px;
      color: #FFB3B3;
    }

    .success-box {
      background: rgba(81, 207, 102, 0.1);
      border: 1px solid #51CF66;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
      font-size: 14px;
      color: #9BF0AA;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 Deposit Management</h1>
      <div class="header-actions">
        <span class="admin-name" id="adminName">Loading...</span>
        <a href="/admin" class="btn btn-secondary">← Back to Admin</a>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-cards" id="statsCards">
      <div class="stat-card">
        <h3>Total Deposits</h3>
        <div class="value" id="statTotal">-</div>
      </div>
      <div class="stat-card">
        <h3>Finished</h3>
        <div class="value" id="statFinished" style="color: #51CF66;">-</div>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <div class="value" id="statPending" style="color: #FFD43B;">-</div>
      </div>
      <div class="stat-card">
        <h3>Failed</h3>
        <div class="value" id="statFailed" style="color: #FF6B6B;">-</div>
      </div>
      <div class="stat-card">
        <h3>Total Received</h3>
        <div class="value" id="statReceived">$0</div>
      </div>
      <div class="stat-card">
        <h3>Needs Review</h3>
        <div class="value" id="statNeedsReview" style="color: #FFD43B;">-</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus" onchange="loadDeposits()">
          <option value="">All</option>
          <option value="created">Created</option>
          <option value="waiting">Waiting</option>
          <option value="confirming">Confirming</option>
          <option value="confirmed">Confirmed</option>
          <option value="finished">Finished</option>
          <option value="failed">Failed</option>
          <option value="expired">Expired</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Coin</label>
        <select id="filterCoin" onchange="loadDeposits()">
          <option value="">All</option>
          <option value="btc">Bitcoin (BTC)</option>
          <option value="eth">Ethereum (ETH)</option>
          <option value="usdt">Tether (USDT)</option>
          <option value="ltc">Litecoin (LTC)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Network</label>
        <select id="filterNetwork" onchange="loadDeposits()">
          <option value="">All</option>
          <option value="btc">Bitcoin</option>
          <option value="eth">Ethereum</option>
          <option value="trc20">TRC20</option>
          <option value="bep20">BEP20</option>
        </select>
      </div>
      <div class="filter-group">
        <label>User ID</label>
        <input type="number" id="filterUserId" placeholder="Enter user ID" onchange="loadDeposits()">
      </div>
      <div class="filter-group">
        <label>Start Date</label>
        <input type="date" id="filterStartDate" onchange="loadDeposits()">
      </div>
      <div class="filter-group">
        <label>End Date</label>
        <input type="date" id="filterEndDate" onchange="loadDeposits()">
      </div>
      <div class="filter-group">
        <label>Reviewed</label>
        <select id="filterReviewed" onchange="loadDeposits()">
          <option value="">All</option>
          <option value="true">Reviewed</option>
          <option value="false">Not Reviewed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Show Stuck</label>
        <select id="filterStuck" onchange="loadDeposits()">
          <option value="">No</option>
          <option value="true">Yes (>24h pending)</option>
        </select>
      </div>
    </div>

    <!-- Deposits Table -->
    <div class="deposits-table">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>User</th>
            <th>Amount</th>
            <th>Coin</th>
            <th>Network</th>
            <th>Status</th>
            <th>Provider</th>
            <th>Reviewed</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="depositsTableBody">
          <tr>
            <td colspan="10" class="loading">Loading deposits...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none;">
      <button id="prevBtn" onclick="prevPage()">← Previous</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextBtn" onclick="nextPage()">Next →</button>
    </div>
  </div>

  <!-- Deposit Details Modal -->
  <div class="modal" id="depositModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Deposit Details</h2>
        <button class="close-modal" onclick="closeModal()">×</button>
      </div>
      <div id="depositDetails">
        <!-- Details will be loaded here -->
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const TOKEN_KEY = 'accessToken';
    const LOGIN_PAGE = '/admin-login';

    let currentPage = 0;
    const pageSize = 50;
    let currentDeposit = null;

    // Auth check
    function checkAuth() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        window.location.href = LOGIN_PAGE;
        return false;
      }
      return token;
    }

    // API call helper
    async function apiCall(endpoint, method = 'GET', body = null) {
      const token = checkAuth();
      if (!token) return null;

      const options = {
        method,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      };

      if (body) {
        options.body = JSON.stringify(body);
      }

      try {
        const response = await fetch(`${API_URL}${endpoint}`, options);
        
        if (response.status === 401 || response.status === 403) {
          console.error(`Auth failed for ${endpoint}: ${response.status}`);
          localStorage.removeItem(TOKEN_KEY);
          window.location.href = LOGIN_PAGE;
          return null;
        }

        if (!response.ok) {
          console.error(`API call failed for ${endpoint}: ${response.status}`);
          return null;
        }

        return response.json();
      } catch (error) {
        console.error(`API call error for ${endpoint}:`, error);
        return null;
      }
    }

    // Load admin name
    async function loadAdminName() {
      const data = await apiCall('/api/admin/me');
      if (data && data.username) {
        document.getElementById('adminName').textContent = `Admin: ${data.username}`;
      }
    }

    // Load stats
    async function loadStats() {
      const data = await apiCall('/api/admin/deposits/stats/summary');
      if (data && data.success) {
        const stats = data.stats;
        document.getElementById('statTotal').textContent = stats.total_deposits || 0;
        document.getElementById('statFinished').textContent = stats.finished || 0;
        document.getElementById('statPending').textContent = stats.pending || 0;
        document.getElementById('statFailed').textContent = stats.failed || 0;
        document.getElementById('statReceived').textContent = `$${parseFloat(stats.total_usd || 0).toFixed(2)}`;
        document.getElementById('statNeedsReview').textContent = stats.needs_review || 0;
      }
    }

    // Load deposits
    async function loadDeposits() {
      const status = document.getElementById('filterStatus').value;
      const coin = document.getElementById('filterCoin').value;
      const network = document.getElementById('filterNetwork').value;
      const userId = document.getElementById('filterUserId').value;
      const startDate = document.getElementById('filterStartDate').value;
      const endDate = document.getElementById('filterEndDate').value;
      const reviewed = document.getElementById('filterReviewed').value;
      const stuck = document.getElementById('filterStuck').value;

      let query = `?limit=${pageSize}&offset=${currentPage * pageSize}`;
      if (status) query += `&status=${status}`;
      if (coin) query += `&coin=${coin}`;
      if (network) query += `&network=${network}`;
      if (userId) query += `&userId=${userId}`;
      if (startDate) query += `&startDate=${startDate}`;
      if (endDate) query += `&endDate=${endDate}`;
      if (reviewed) query += `&reviewed=${reviewed}`;
      if (stuck) query += `&stuck=${stuck}`;

      const data = await apiCall(`/api/admin/deposits${query}`);
      
      if (data && data.success) {
        renderDeposits(data.deposits);
        updatePagination(data.pagination);
      }
    }

    // Render deposits table
    function renderDeposits(deposits) {
      const tbody = document.getElementById('depositsTableBody');
      
      if (deposits.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty-state">
              <div>No deposits found</div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = deposits.map(deposit => `
        <tr onclick="showDepositDetails(${deposit.id})">
          <td>#${deposit.id}</td>
          <td>${new Date(deposit.created_at).toLocaleString()}</td>
          <td>${deposit.username} (#${deposit.user_id})</td>
          <td>${deposit.amount || deposit.pay_amount || '0'} ${(deposit.coin || deposit.pay_currency || 'N/A').toUpperCase()}</td>
          <td>${(deposit.coin || deposit.pay_currency || 'N/A').toUpperCase()}</td>
          <td>${(deposit.network || 'N/A').toUpperCase()}</td>
          <td><span class="status-badge status-${deposit.status}">${deposit.status.toUpperCase()}</span></td>
          <td>${deposit.provider || 'nowpayments'}</td>
          <td>${deposit.reviewed_by ? '✅' : '❌'}</td>
          <td><button class="btn btn-primary" onclick="event.stopPropagation(); showDepositDetails(${deposit.id})">View</button></td>
        </tr>
      `).join('');
    }

    // Show deposit details
    async function showDepositDetails(depositId) {
      const data = await apiCall(`/api/admin/deposits/${depositId}`);
      
      if (data && data.success) {
        currentDeposit = data.deposit;
        renderDepositDetails(currentDeposit);
        document.getElementById('depositModal').classList.add('active');
      }
    }

    // Render deposit details
    function renderDepositDetails(deposit) {
      document.getElementById('depositDetails').innerHTML = `
        <div class="detail-group">
          <label>Deposit ID</label>
          <div class="value">#${deposit.id}</div>
        </div>
        <div class="detail-group">
          <label>Status</label>
          <div class="value"><span class="status-badge status-${deposit.status}">${deposit.status.toUpperCase()}</span></div>
        </div>
        <div class="detail-group">
          <label>User</label>
          <div class="value">${deposit.username} (#${deposit.user_id}) - ${deposit.email}</div>
        </div>
        <div class="detail-group">
          <label>Payment Amount</label>
          <div class="value">${deposit.pay_amount || 0} ${(deposit.pay_currency || '').toUpperCase()}</div>
        </div>
        <div class="detail-group">
          <label>Expected Amount (USD)</label>
          <div class="value">$${deposit.price_amount || 0} ${(deposit.price_currency || 'USD').toUpperCase()}</div>
        </div>
        <div class="detail-group">
          <label>Cryptocurrency</label>
          <div class="value">${(deposit.pay_currency || '').toUpperCase()}</div>
        </div>
        <div class="detail-group">
          <label>Payment Address</label>
          <div class="value" style="word-break: break-all;">${deposit.pay_address || 'N/A'}</div>
        </div>
        <div class="detail-group">
          <label>Provider</label>
          <div class="value">${deposit.provider || 'nowpayments'} (Payment ID: ${deposit.payment_id || 'N/A'})</div>
        </div>
        <div class="detail-group">
          <label>Created At</label>
          <div class="value">${new Date(deposit.created_at).toLocaleString()}</div>
        </div>
        ${deposit.updated_at ? `
          <div class="detail-group">
            <label>Last Updated</label>
            <div class="value">${new Date(deposit.updated_at).toLocaleString()}</div>
          </div>
        ` : ''}
        ${deposit.status === 'finished' ? `
          <div class="success-box">
            ✅ Payment completed and credited to user balance
          </div>
        ` : ''}
        ${deposit.status === 'waiting' || deposit.status === 'pending' ? `
          <div class="warning-box">
            ⏳ Waiting for payment confirmation from NOWPayments
          </div>
        ` : ''}

        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        </div>
      `;
    }

    // Reprocess deposit
    async function reprocessDeposit(depositId) {
      if (!confirm('Are you sure you want to reprocess this deposit and credit the user?')) {
        return;
      }

      const data = await apiCall(`/api/admin/deposits/${depositId}/reprocess`, 'POST');
      
      if (data && data.success) {
        alert(`Deposit reprocessed successfully!\nAmount: $${data.amount}\nNew Balance: $${data.newBalance}`);
        closeModal();
        loadDeposits();
        loadStats();
      } else {
        alert(`Failed to reprocess: ${data.error || 'Unknown error'}`);
      }
    }

    // Mark as reviewed
    async function markReviewed(depositId) {
      const notes = prompt('Enter review notes (optional):');
      
      const data = await apiCall(`/api/admin/deposits/${depositId}/review`, 'POST', { notes });
      
      if (data && data.success) {
        alert('Deposit marked as reviewed');
        closeModal();
        loadDeposits();
        loadStats();
      } else {
        alert(`Failed to mark as reviewed: ${data.error || 'Unknown error'}`);
      }
    }

    // Close modal
    function closeModal() {
      document.getElementById('depositModal').classList.remove('active');
      currentDeposit = null;
    }

    // Pagination
    function updatePagination(pagination) {
      const paginationDiv = document.getElementById('pagination');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pageInfo = document.getElementById('pageInfo');

      paginationDiv.style.display = 'flex';
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = (currentPage + 1) * pageSize >= pagination.total;
      pageInfo.textContent = `Page ${currentPage + 1} (${pagination.total} total)`;
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        loadDeposits();
      }
    }

    function nextPage() {
      currentPage++;
      loadDeposits();
    }

    // Logout
    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = LOGIN_PAGE;
    }

    // Initialize
    window.onload = () => {
      checkAuth();
      loadAdminName();
      loadStats();
      loadDeposits();

      // Auto-refresh every 30 seconds
      setInterval(() => {
        loadStats();
        loadDeposits();
      }, 30000);
    };
  </script>
</body>
</html>
